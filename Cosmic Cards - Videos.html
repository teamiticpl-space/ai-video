document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"328cac24-a497-44fe-9b5c-d7194f2a6791\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Prompt';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e10aa1b1-a27c-4c28-aa1b-58d3cdb2b7c7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --bg-0: #0a0f28;\n    --bg-1: #131a42;\n    --bg-2: #1d2560;\n    --ink: #f4e9c9;\n    --ink-dim: rgba(244,233,201,.65);\n    --gold: #e8c76a;\n    --gold-2: #f5dc8a;\n    --gold-dim: rgba(232,199,106,.35);\n    --purple: #7a5ac9;\n    --purple-deep: #3e2879;\n  }\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0; min-height: 100%;\n    font-family: 'Prompt', system-ui, sans-serif;\n    color: var(--ink);\n    background:\n      radial-gradient(ellipse at 20% 10%, rgba(122,90,201,.25), transparent 55%),\n      radial-gradient(ellipse at 85% 85%, rgba(232,199,106,.1), transparent 55%),\n      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 60%, var(--bg-0) 100%);\n    background-attachment: fixed;\n    overflow-x: hidden;\n  }\n\n  /* Starfield */\n  .stars, .stars::before, .stars::after {\n    position: fixed; inset: 0; pointer-events: none; z-index: 0;\n  }\n  .stars::before, .stars::after {\n    content: \"\"; display: block;\n    background-image:\n      radial-gradient(1.5px 1.5px at 14% 22%, #fff 50%, transparent),\n      radial-gradient(1px 1px at 42% 78%, rgba(255,255,255,.9) 50%, transparent),\n      radial-gradient(1.2px 1.2px at 67% 32%, #fff 50%, transparent),\n      radial-gradient(1px 1px at 88% 64%, rgba(255,255,255,.8) 50%, transparent),\n      radial-gradient(1.3px 1.3px at 8% 86%, #fff 50%, transparent),\n      radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,.9) 50%, transparent),\n      radial-gradient(1.5px 1.5px at 55% 48%, #fff 50%, transparent),\n      radial-gradient(1px 1px at 33% 9%, rgba(255,255,255,.85) 50%, transparent),\n      radial-gradient(1px 1px at 78% 92%, #fff 50%, transparent);\n    background-size: 100% 100%;\n    opacity: .6;\n    animation: twinkle 4s ease-in-out infinite alternate;\n  }\n  .stars::after {\n    background-image:\n      radial-gradient(1px 1px at 25% 60%, #fff 50%, transparent),\n      radial-gradient(1.2px 1.2px at 75% 20%, rgba(255,255,255,.9) 50%, transparent),\n      radial-gradient(1px 1px at 50% 85%, #fff 50%, transparent),\n      radial-gradient(1.5px 1.5px at 10% 42%, rgba(255,255,255,.7) 50%, transparent),\n      radial-gradient(1px 1px at 96% 48%, #fff 50%, transparent);\n    animation-delay: 2s;\n    opacity: .45;\n  }\n  @keyframes twinkle { from { opacity: .3 } to { opacity: .75 } }\n\n  /* Constellation lines (background) */\n  .web {\n    position: fixed; inset: 0; z-index: 0; pointer-events: none;\n    opacity: .22;\n  }\n\n  /* Layout */\n  .wrap { position: relative; z-index: 2; max-width: 1240px; margin: 0 auto; padding: 28px 32px 100px; }\n  .hd { text-align: center; margin-bottom: 36px; }\n  .hd .kicker {\n    display: inline-block;\n    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;\n    color: var(--gold); margin-bottom: 18px;\n    padding: 6px 14px; border: 1px solid var(--gold-dim); border-radius: 999px;\n  }\n  .hd h1 {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: clamp(40px, 6vw, 68px);\n    font-weight: 500; margin: 0 0 12px;\n    letter-spacing: -0.01em;\n    background: linear-gradient(180deg, var(--ink) 20%, var(--gold) 100%);\n    -webkit-background-clip: text; background-clip: text;\n    -webkit-text-fill-color: transparent;\n  }\n  .hd p {\n    margin: 0; font-size: 15px; color: var(--ink-dim); font-weight: 300;\n    max-width: 460px; margin: 0 auto; line-height: 1.7;\n  }\n\n  /* Grid — 3+2 layout like reference */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: clamp(20px, 4vw, 56px) clamp(16px, 3vw, 48px);\n    justify-items: center;\n    max-width: 900px; margin: 0 auto;\n  }\n  .grid .slot:nth-child(4) { grid-column: 1 / span 3; }\n  .grid .slot:nth-child(4) .row-2 {\n    display: grid; grid-template-columns: repeat(2, 1fr);\n    gap: clamp(16px, 3vw, 48px); justify-items: center;\n    max-width: 560px; margin: 0 auto;\n  }\n\n  .slot { perspective: 1400px; display: flex; flex-direction: column; align-items: center; gap: 16px; }\n\n  /* Card */\n  .card {\n    width: 240px; height: 360px;\n    position: relative;\n    transform-style: preserve-3d;\n    transition: transform .9s cubic-bezier(.76,.02,.25,.99);\n    cursor: pointer;\n  }\n  @media (max-width: 720px) {\n    .card { width: 180px; height: 270px; }\n  }\n  @media (max-width: 420px) {\n    .card { width: 140px; height: 210px; }\n  }\n  .card.flipped { transform: rotateY(180deg); }\n  .card.dimmed { filter: brightness(.45) saturate(.6); transform: scale(.96); transition: filter .5s, transform .5s; }\n  .card.viewed { filter: brightness(.55) saturate(.7); transition: filter .6s; }\n  .card.viewed::after {\n    content: \"✓ ดูแล้ว\";\n    position: absolute; top: 10px; right: 10px; z-index: 5;\n    background: rgba(232,199,106,.85); color: #131a42;\n    font-family: 'Prompt', sans-serif; font-size: 10px; font-weight: 500;\n    letter-spacing: 1px;\n    padding: 3px 8px; border-radius: 999px;\n    pointer-events: none;\n  }\n  .card:not(.flipped):not(.dimmed):hover { transform: translateY(-6px) scale(1.02); }\n\n  .face {\n    position: absolute; inset: 0;\n    backface-visibility: hidden;\n    -webkit-backface-visibility: hidden;\n    border-radius: 14px;\n    overflow: hidden;\n  }\n\n  /* Back of card (shown first) */\n  .back {\n    background:\n      radial-gradient(ellipse at 50% 40%, rgba(232,199,106,.35) 0%, transparent 45%),\n      radial-gradient(ellipse at 50% 100%, rgba(122,90,201,.55) 0%, transparent 60%),\n      linear-gradient(180deg, #1a2156 0%, #0f1436 100%);\n    border: 1px solid rgba(232,199,106,.45);\n    box-shadow:\n      0 0 0 1px rgba(232,199,106,.15),\n      0 20px 60px rgba(0,0,0,.5),\n      0 0 40px rgba(232,199,106,.15);\n  }\n  .back::before {\n    content: \"\"; position: absolute; inset: 10px;\n    border: 1px solid rgba(232,199,106,.55);\n    border-radius: 8px;\n    pointer-events: none;\n  }\n  .back::after {\n    content: \"\"; position: absolute; inset: 14px;\n    border: 1px dashed rgba(232,199,106,.25);\n    border-radius: 6px;\n    pointer-events: none;\n  }\n  .back-inner {\n    position: absolute; inset: 0;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .sigil {\n    width: 68%; aspect-ratio: 1;\n    position: relative;\n    filter: drop-shadow(0 0 14px rgba(232,199,106,.4));\n  }\n  .back-photo {\n    width: 68%; aspect-ratio: 1;\n    border-radius: 50%;\n    overflow: hidden;\n    position: relative;\n    border: 1.5px solid rgba(232,199,106,.55);\n    box-shadow:\n      0 0 40px rgba(232,199,106,.28),\n      inset 0 0 28px rgba(232,199,106,.14);\n    background: radial-gradient(circle at 50% 40%, rgba(232,199,106,.22), rgba(0,0,0,.35) 72%);\n  }\n  .back-photo::after {\n    /* faint inner ring to echo the sigil's concentric circles */\n    content: \"\"; position: absolute; inset: 6px;\n    border-radius: 50%;\n    border: 1px solid rgba(232,199,106,.22);\n    pointer-events: none;\n  }\n  .back-photo img {\n    width: 100%; height: 100%;\n    object-fit: cover;\n    display: block;\n  }\n  .card-label {\n    position: absolute; top: 20px; left: 0; right: 0; text-align: center;\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 14px; letter-spacing: 6px; color: rgba(232,199,106,.75);\n    text-transform: uppercase;\n  }\n  .card-label-bottom {\n    position: absolute; bottom: 18px; left: 0; right: 0; text-align: center;\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 13px; letter-spacing: 4px; color: rgba(232,199,106,.55);\n    text-transform: uppercase;\n  }\n  .corners { position: absolute; inset: 22px; pointer-events: none; }\n  .corners::before, .corners::after {\n    content: \"\"; position: absolute; width: 18px; height: 18px;\n    border: 1.5px solid rgba(232,199,106,.6);\n  }\n  .corners::before { top: 0; left: 0; border-right: 0; border-bottom: 0; }\n  .corners::after { bottom: 0; right: 0; border-left: 0; border-top: 0; }\n\n  /* Front = video (no longer shown as big reveal; kept subtle for flipped state) */\n  .front {\n    transform: rotateY(180deg);\n    background:\n      radial-gradient(ellipse at 30% 30%, rgba(232,199,106,.35), transparent 55%),\n      radial-gradient(ellipse at 70% 70%, rgba(122,90,201,.5), transparent 55%),\n      linear-gradient(135deg, #2a1e5c, #0d1230);\n    border: 1px solid rgba(232,199,106,.5);\n    box-shadow: 0 0 0 1px rgba(232,199,106,.2), 0 20px 60px rgba(0,0,0,.6), 0 0 40px rgba(232,199,106,.22);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--gold);\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 22px; letter-spacing: 3px;\n  }\n  .front .front-label { text-align: center; }\n  .front .front-label .eyebrow {\n    font-family: 'Prompt', sans-serif; font-size: 10px; letter-spacing: 3px;\n    color: rgba(232,199,106,.7); margin-bottom: 8px; text-transform: uppercase;\n  }\n\n  /* Caption under card */\n  .caption {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 20px; letter-spacing: 1px;\n    color: var(--ink);\n    font-weight: 500;\n    transition: color .3s;\n    white-space: nowrap;\n    text-align: center;\n  }\n  .slot.active .caption { color: var(--gold); text-shadow: 0 0 18px rgba(232,199,106,.4); }\n\n  /* Footer nav */\n  .navbar {\n    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);\n    z-index: 10;\n    display: flex; gap: 8px; align-items: center;\n    background: rgba(10,15,40,.75);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    border: 1px solid rgba(232,199,106,.28);\n    border-radius: 999px;\n    padding: 8px 12px;\n    opacity: 0; pointer-events: none;\n    transition: opacity .4s, transform .4s;\n  }\n  .navbar.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }\n  .navbar button {\n    background: transparent; border: none; color: var(--ink);\n    padding: 8px 14px; border-radius: 999px; cursor: pointer;\n    font-family: 'Prompt', sans-serif; font-size: 13px; font-weight: 400;\n    display: inline-flex; align-items: center; gap: 6px;\n    transition: background .2s, color .2s;\n  }\n  .navbar button:hover { background: rgba(232,199,106,.15); color: var(--gold); }\n  .navbar .divider { width: 1px; height: 18px; background: rgba(232,199,106,.25); margin: 0 4px; }\n  .navbar .dots { display: flex; gap: 6px; padding: 0 6px; }\n  .navbar .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: rgba(244,233,201,.28);\n    cursor: pointer; transition: background .2s, transform .2s;\n  }\n  .navbar .dot.active { background: var(--gold); transform: scale(1.3); }\n\n  /* Tweaks panel */\n  .tweaks {\n    position: fixed; right: 20px; bottom: 20px; z-index: 50;\n    width: 260px;\n    background: rgba(10,15,40,.92);\n    backdrop-filter: blur(14px);\n    border: 1px solid rgba(232,199,106,.3);\n    border-radius: 14px; padding: 14px 16px 16px;\n    color: var(--ink);\n    font-size: 13px;\n    box-shadow: 0 20px 60px rgba(0,0,0,.5);\n    display: none;\n  }\n  .tweaks.open { display: block; }\n  .tweaks h4 { font-family: 'Cormorant Garamond', serif; font-size: 18px; margin: 0 0 12px; color: var(--gold); letter-spacing: 2px; }\n  .tweaks .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }\n  .tweaks .row label { font-size: 12px; color: var(--ink-dim); }\n  .tweaks select, .tweaks .seg {\n    background: rgba(0,0,0,.3); border: 1px solid rgba(232,199,106,.25);\n    color: var(--ink); border-radius: 6px; padding: 4px 8px;\n    font-family: 'Prompt', sans-serif; font-size: 12px;\n  }\n  .tweaks .seg { display: inline-flex; padding: 0; }\n  .tweaks .seg button {\n    background: transparent; border: none; color: var(--ink-dim);\n    padding: 5px 10px; cursor: pointer; font-size: 11px;\n    font-family: inherit;\n  }\n  .tweaks .seg button.active { background: rgba(232,199,106,.2); color: var(--gold); }\n\n  /* Hint */\n  .hint {\n    text-align: center; margin-top: 40px;\n    font-family: 'Cormorant Garamond', serif; font-style: italic;\n    color: var(--ink-dim); font-size: 15px; letter-spacing: 1px;\n  }\n  .hint.hidden { opacity: 0; transition: opacity .3s; }\n\n  /* Utility */\n  .sr { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }\n\n  /* ========== Fullscreen video player (portrait) ========== */\n  .player {\n    position: fixed; inset: 0; z-index: 100;\n    background: rgba(5,8,22,.92);\n    backdrop-filter: blur(20px);\n    -webkit-backdrop-filter: blur(20px);\n    display: flex; align-items: center; justify-content: center;\n    opacity: 0; pointer-events: none;\n    transition: opacity .4s ease;\n  }\n  .player.show { opacity: 1; pointer-events: auto; }\n\n  .player-stage {\n    position: relative;\n    height: min(92vh, 900px);\n    aspect-ratio: 9 / 16;\n    max-width: 92vw;\n    border-radius: 18px;\n    overflow: hidden;\n    box-shadow: 0 0 0 1px rgba(232,199,106,.35), 0 0 80px rgba(232,199,106,.25), 0 40px 120px rgba(0,0,0,.6);\n    transform: scale(.94);\n    transition: transform .5s cubic-bezier(.2,.8,.2,1);\n    background: #000;\n  }\n  .player.show .player-stage { transform: scale(1); }\n\n  .player-video, .player-stub {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    object-fit: cover;\n    display: block;\n  }\n  .player-iframe {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    border: 0;\n    display: block;\n    background: #000;\n  }\n  .player-stub {\n    background:\n      radial-gradient(ellipse at 30% 20%, rgba(232,199,106,.4), transparent 55%),\n      radial-gradient(ellipse at 70% 80%, rgba(122,90,201,.55), transparent 55%),\n      linear-gradient(160deg, #2a1e5c, #0d1230);\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    color: var(--ink);\n  }\n  .player-stub::before {\n    content: \"\"; position: absolute; inset: 0;\n    background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.02) 0 2px, transparent 2px 8px);\n  }\n  .player-stub .stub-name {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: clamp(32px, 6vw, 56px);\n    letter-spacing: 4px;\n    font-weight: 500;\n    color: var(--gold);\n    text-shadow: 0 0 30px rgba(232,199,106,.4);\n    z-index: 1;\n  }\n  .player-stub .stub-tag {\n    font-family: 'Cormorant Garamond', serif;\n    font-style: italic;\n    font-size: 16px; letter-spacing: 3px;\n    color: var(--ink-dim); margin-top: 10px; z-index: 1;\n  }\n  .player-stub .stub-demo {\n    z-index: 1; margin-top: 36px;\n    display: flex; flex-direction: column; align-items: center; gap: 14px;\n  }\n  .player-stub .simulated-progress {\n    width: 200px; height: 3px; background: rgba(255,255,255,.2); border-radius: 2px; overflow: hidden;\n    margin-top: 20px;\n  }\n  .player-stub .simulated-progress::after {\n    content: \"\"; display: block; height: 100%;\n    background: var(--gold);\n    animation: fakePlay var(--stub-dur, 8s) linear forwards;\n  }\n  @keyframes fakePlay { from { width: 0% } to { width: 100% } }\n\n  .player-chrome {\n    position: absolute; inset: 0; pointer-even ight { display: none; }\n  }\n\n  .post-cta {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    gap: 14px;\n    background: radial-gradient(ellipse at 50% 50%, rgba(10,15,40,.78), rgba(5,8,22,.92));\n    opacity: 0; pointer-events: none;\n    transition: opacity .4s ease;\n    padding: 24px;\n  }\n  .post-cta.show { opacity: 1; pointer-events: auto; }\n  .post-cta .title {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 24px; letter-spacing: 3px; color: var(--gold);\n    text-align: center;\n  }\n  .post-cta .sub {\n    font-size: 13px; color: var(--ink-dim); text-align: center; letter-spacing: 1px;\n  }\n  .post-cta .row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }\n  .cta-btn {\n    background: transparent; color: var(--ink); border: 1px solid rgba(232,199,106,.45);\n    padding: 10px 18px; border-radius: 999px; cursor: pointer;\n    font-family: 'Prompt', sans-serif; font-size: 13px;\n    display: inline-flex; align-items: center; gap: 8px;\n    transition: background .2s, color .2s, border-color .2s;\n  }\n  .cta-btn:hover { background: rgba(232,199,106,.18); color: var(--gold); }\n  .cta-btn.primary { background: var(--gold); color: #131a42; border-color: var(--gold); font-weight: 500; }\n  .cta-btn.primary:hover { background: var(--gold-2); color: #131a42; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<template id=\"__bundler_thumbnail\" data-bg-color=\"#0a0f28\">\n  <svg viewBox=\"0 0 1200 800\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs>\n      <radialGradient id=\"cardg\" cx=\"50%\" cy=\"45%\" r=\"55%\">\n        <stop offset=\"0%\" stop-color=\"#f5dc8a\" stop-opacity=\".9\"><\u002Fstop>\n        <stop offset=\"70%\" stop-color=\"#e8c76a\" stop-opacity=\".3\"><\u002Fstop>\n        <stop offset=\"100%\" stop-color=\"#e8c76a\" stop-opacity=\"0\"><\u002Fstop>\n      <\u002FradialGradient>\n    <\u002Fdefs>\n    <rect x=\"4 ass=\"cta-btn\" id=\"p-replay\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M2 7a5 5 0 1 0 1.5-3.5\"><\u002Fpath><path d=\"M2 2v3h3\"><\u002Fpath><\u002Fsvg> เล่นอีกครั้ง<\u002Fbutton>\n          <button class=\"cta-btn primary\" id=\"p-back\">กลับสู่การ์ด<\u002Fbutton>\n          <button class=\"cta-btn\" id=\"p-next2\">ร้านถัดไป <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M5 3l4 4-4 4\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"player-side-nav right\">\n    <button class=\"icon-btn\" id=\"p-next\" aria-label=\"Next\">\n      <svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M5 3l4 4-4 4\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div class=\"tweaks\" id=\"tweaks\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"row\">\n    <label>Accent<\u002Flabel>\n    <div class=\"seg\" id=\"accent-seg\">\n      <button data-val=\"gold\" class=\"active\">Gold<\u002Fbutton>\n      <button data-val=\"rose\">Rose<\u002Fbutton>\n      <button data-val=\"teal\">Teal<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>Layout<\u002Flabel>\n    <div class=\"seg\" id=\"layout-seg\">\n      <button data-val=\"3x2\" class=\"active\">3+2<\u002Fbutton>\n      <button data-val=\"row\">Row<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>Flip duration<\u002Flabel>\n    <div class=\"seg\" id=\"dur-seg\">\n      <button data-val=\".6\">Fast<\u002Fbutton>\n      <button data-val=\".9\" class=\"active\">Default<\u002Fbutton>\n      <button data-val=\"1.3\">Dreamy<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>Glow<\u002Flabel>\n    <div class=\"seg\" id=\"glow-seg\">\n      <button data-val=\"on\" class=\"active\">On<\u002Fbutton>\n      <button data-val=\"off\">Off<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"accent\": \"gold\",\n    \"layout\": \"3x2\",\n    \"flipDur\": \"1.3\",\n    \"glow\": \"on\"\n  }/*EDITMODE-END*/;\n\n  const SHOPS = [\n    { id: 'A', name: 'ร้านโก๋เคมีเกษตร',      tag: 'The Star',  driveId: '1cO7r1oTFGhdQxtMEVk6t8A2Vwo8TfMqO', video: 'ร้านโก๋การเกษตร.mp4', photo: 'โก๋การเกษตร.png' },\n    { id: 'B', name: 'ร้านเฮงฮวดการเกษตร',   tag: 'The Moon',  driveId: '1fMIGQqNAETUTG_0E_6Gvlucxr2kFWtJV', video: 'ร้านเฮงฮวดการเกษตร Final (1).mp4', photo: 'เฮงฮวด.png' },\n    { id: 'C', name: 'ร้านชัยพฤกษ์ ไดร์ฟทรู', tag: 'The Sun',   driveId: '1AAfyvpMENXQAraNYG9ISA_O5NdzshXga', video: 'ร้านชัยพฤกษ์ ไดร์ฟทรู Final (1).mp4', photo: 'ชัยพฤกษ์เกษตร.png' },\n    { id: 'D', name: 'ร้านนำชัยเกษตร',       tag: 'จ.สุราษฎร์ธานี', driveId: '18MSHhc5dupXumhHITe_J5xpswbgOvMyN', video: 'ร้านนำชัยเกษตร จ.สุราษฎร์ธานี (Final).mp4', photo: 'นำชัยเกษตร.png' },\n    { id: 'E', name: 'ร้าน ส.เอเชียเกษตรภัณฑ์', tag: 'จ.สุราษฎร์ธานี', driveId: '1wXfHD7KC1Vo0MCjSTwt2XZ0rGy1wDzcc', video: 'ส.เอเชียเกษตรภัณฑ์ จ.สุราษฎร์ธานี (Final).mp4', photo: 'ส.เอเชีย.png' },\n  ];\n\n  const state = {\n    flipped: null, // shop id currently opened (fullscreen)\n    viewed: new Set(), // shop ids whose video finished at least once\n    muted: true,\n    playing: false,\n    simTimer: null,\n    simStart: 0,\n    simDur: 8000,\n    tweaks: { ...TWEAK_DEFAULTS },\n    currentVideo: null,\n    currentIframe: null,\n  };\n\n  // ─── Build grid ────────────────────────────────────────────\n  function sigilSVG(seed) {\n    const rot = seed * 30;\n    return `\n      <svg class=\"sigil\" viewBox=\"0 0 100 100\">\n        <defs>\n          <radialGradient id=\"g${seed}\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n            <stop offset=\"0%\" stop-color=\"rgba(245,220,138,0.9)\"/>\n            <stop offset=\"70%\" stop-color=\"rgba(232,199,106,0.3)\"/>\n            <stop offset=\"100%\" stop-color=\"rgba(232,199,106,0)\"/>\n          <\u002FradialGradient>\n        <\u002Fdefs>\n        <g transform=\"translate(50 50) rotate(${rot})\">\n          <circle r=\"30\" fill=\"url(#g${seed})\"/>\n          <g stroke=\"rgba(245,220,138,0.8)\" stroke-width=\".8\" fill=\"none\">\n            <circle r=\"28\"/>\n            <circle r=\"20\"/>\n            <circle r=\"12\"/>\n          <\u002Fg>\n          <g stroke=\"rgba(245,220,138,0.9)\" stroke-width=\".8\" fill=\"rgba(245,220,138,0.15)\">\n            <path d=\"M0 -26 L 7.5 -7.5 L 26 0 L 7.5 7.5 L 0 26 L -7.5 7.5 L -26 0 L -7.5 -7.5 Z\"/>\n          <\u002Fg>\n          <g fill=\"rgba(245,220,138,0.9)\">\n            <circle cx=\"0\" cy=\"-12\" r=\"1.4\"/>\n            <circle cx=\"12\" cy=\"0\" r=\"1.4\"/>\n            <circle cx=\"0\" cy=\"12\" r=\"1.4\"/>\n            <circle cx=\"-12\" cy=\"0\" r=\"1.4\"/>\n          <\u002Fg>\n          <circle r=\"2\" fill=\"rgba(255,240,190,1)\"/>\n        <\u002Fg>\n      <\u002Fsvg>`;\n  }\n\n  function cardHTML(shop, idx) {\n    const backMedia = shop.photo\n      ? `<div class=\"back-photo\"><img src=\"${encodeURI(shop.photo)}\" alt=\"${shop.name}\" loading=\"lazy\"><\u002Fdiv>`\n      : sigilSVG(idx);\n    return `\n      <article class=\"card\" data-id=\"${shop.id}\" data-idx=\"${idx}\" role=\"button\" tabindex=\"0\" aria-label=\"เปิด${shop.name}\">\n        <div class=\"face back\">\n          <div class=\"card-label\">Arcana · ${String(idx+1).padStart(2,'0')}<\u002Fdiv>\n          <div class=\"corners\"><\u002Fdiv>\n          <div class=\"back-inner\">${backMedia}<\u002Fdiv>\n          <div class=\"card-label-bottom\">${shop.tag}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"face front\">\n          <div class=\"front-label\">\n            <div class=\"eyebrow\">ดูแล้ว<\u002Fdiv>\n            ${shop.name}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Farticle>\n      <div class=\"caption\">${shop.name}<\u002Fdiv>\n    `;\n  }\n\n  function render() {\n    const grid = document.getElementById('grid');\n    const layout = state.tweaks.layout;\n\n    if (layout === 'row') {\n      grid.style.gridTemplateColumns = `repeat(${SHOPS.length}, 1fr)`;\n      grid.style.maxWidth = '1200px';\n      grid.innerHTML = SHOPS.map((s, i) => `<div class=\"slot\" data-idx=\"${i}\">${cardHTML(s, i)}<\u002Fdiv>`).join('');\n    } else {\n      grid.style.gridTemplateColumns = '';\n      grid.style.maxWidth = '900px';\n      grid.innerHTML = `\n        ${SHOPS.slice(0, 3).map((s, i) => `<div class=\"slot\" data-idx=\"${i}\">${cardHTML(s, i)}<\u002Fdiv>`).join('')}\n        <div class=\"slot\"><div class=\"row-2\">\n          ${SHOPS.slice(3).map((s, i) => `<div class=\"slot\" data-idx=\"${i+3}\">${cardHTML(s, i+3)}<\u002Fdiv>`).join('')}\n        <\u002Fdiv><\u002Fdiv>\n      `;\n    }\n    bindCards();\n    renderDots();\n  }\n\n  function renderDots() {\n    const dots = document.getElementById('dots');\n    dots.innerHTML = SHOPS.map((s, i) =>\n      `<span class=\"dot ${state.flipped === s.id ? 'active' : ''}\" data-idx=\"${i}\" role=\"button\" aria-label=\"${s.name}\"><\u002Fspan>`\n    ).join('');\n    dots.querySelectorAll('.dot').forEach(d => {\n      d.addEventListener('click', () => openByIdx(parseInt(d.dataset.idx)));\n    });\n  }\n\n  // ─── Flip logic ────────────────────────────────────────────\n  function bindCards() {\n    document.querySelectorAll('.card').forEach(card => {\n      const id = card.dataset.id;\n      card.addEventListener('click', (e) => {\n        openById(id);\n      });\n      card.addEventListener('keydown', (e) => {\n        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }\n      });\n    });\n  }\n\n  function openById(id) {\n    const shop = SHOPS.find(s => s.id === id);\n    if (!shop) return;\n    state.flipped = id;\n    document.getElementById('hint')?.classList.add('hidden');\n    // Mark card as flipped in the grid (stays flipped while player shows & after)\n    document.querySelectorAll('.card').forEach(c => {\n      c.classList.toggle('flipped', c.dataset.id === id || state.viewed.has(c.dataset.id));\n      c.classList.toggle('viewed', state.viewed.has(c.dataset.id) && c.dataset.id !== id);\n      c.classList.remove('dimmed');\n    });\n    // Launch fullscreen player\n    launchPlayer(shop);\n    renderDots();\n  }\n\n  function launchPlayer(shop) {\n    const stage = document.getElementById('p-stage');\n    // remove any previous stub/video/iframe (keep chrome + cta)\n    stage.querySelectorAll('.player-video, .player-stub, .player-iframe').forEach(n => n.remove());\n\n    const fill = document.getElementById('p-fill');\n    state.currentVideo = null;\n    state.currentIframe = null;\n\n    if (shop.driveId) {\n      // Google Drive hosted clip → use Drive's preview iframe at max quality.\n      // vq=hd2160 forces highest available resolution (falls back to source max).\n      const iframe = document.createElement('iframe');\n      iframe.className = 'player-iframe';\n      iframe.src = 'https://drive.google.com/file/d/' + shop.driveId + '/preview?vq=hd2160';\n      iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');\n      iframe.setAttribute('allowfullscreen', '');\n      iframe.setAttribute('frameborder', '0');\n      stage.insertBefore(iframe, stage.firstChild);\n      state.currentIframe = iframe;\n      // Drive player has its own controls — our custom progress/play/mute\n      // can't sync with the iframe (no postMessage API). Hide them subtly.\n      fill.style.width = '0%';\n    } else {\n      // Local mp4 → native <video> element with our custom chrome.\n      const video = document.createElement('video');\n      video.className = 'player-video';\n      // encodeURI handles spaces + Thai chars in the filename\n      video.src = encodeURI(shop.video);\n      video.playsInline = true;\n      video.setAttribute('playsinline', '');\n      video.muted = state.muted;\n      video.preload = 'auto';\n      video.controls = false;\n      stage.insertBefore(video, stage.firstChild);\n      state.currentVideo = video;\n\n      video.addEventListener('timeupdate', () => {\n        if (!video.duration || isNaN(video.duration)) return;\n        fill.style.width = ((video.currentTime / video.duration) * 100) + '%';\n      });\n      video.addEventListener('ended', onVideoEnded);\n      video.addEventListener('play', () => {\n        state.playing = true;\n        document.getElementById('p-play-ico').innerHTML = '<path d=\"M4 3h3v10H4zM9 3h3v10H9z\"/>';\n      });\n      video.addEventListener('pause', () => {\n        state.playing = false;\n        document.getElementById('p-play-ico').innerHTML = '<path d=\"M5 3v10l9-5z\"/>';\n      });\n      video.addEventListener('error', () => {\n        console.warn('Video failed to load:', shop.video);\n      });\n      video.addEventListener('click', togglePlay);\n      fill.style.width = '0%';\n      const p = video.play();\n      if (p && typeof p.catch === 'function') p.catch(() => {});\n    }\n\n    document.getElementById('p-eyebrow').textContent = `Arcana · ${String(SHOPS.findIndex(s => s.id === shop.id) + 1).padStart(2,'0')}`;\n    document.getElementById('p-shop').textContent = shop.name;\n    document.getElementById('p-cta-title').textContent = `การ์ดของ${shop.name}ได้เปิดแล้ว`;\n    document.getElementById('p-cta').classList.remove('show');\n\n    document.getElementById('player').classList.add('show');\n    document.getElementById('player').setAttribute('aria-hidden', 'false');\n  }\n\n  function startFakePlayback() { /* replaced by real <video> events */ }\n\n  function togglePlay() {\n    if (!state.flipped || !state.currentVideo) return;\n    if (state.currentVideo.paused || state.currentVideo.ended) {\n      state.currentVideo.play().catch(() => {});\n    } else {\n      state.currentVideo.pause();\n    }\n  }\n\n  function onVideoEnded() {\n    state.playing = false;\n    // Mark shop as viewed\n    if (state.flipped) state.viewed.add(state.flipped);\n    // Auto-close back to main grid when clip finishes\n    setTimeout(() => { closePlayer(); }, 250);\n  }\n\n  function closePlayer() {\n    clearInterval(state.simTimer);\n    state.playing = false;\n    if (state.currentVideo) {\n      try { state.currentVideo.pause(); } catch(e) {}\n      state.currentVideo.removeAttribute('src');\n      state.currentVideo.load();\n      state.currentVideo.remove();\n      state.currentVideo = null;\n    }\n    if (state.currentIframe) {\n      // Kill iframe to stop any audio/video playback from Drive's player\n      state.currentIframe.src = 'about:blank';\n      state.currentIframe.remove();\n      state.currentIframe = null;\n    }\n    // Keep card \"viewed\" state regardless of whether finished or manually closed\n    if (state.flipped) state.viewed.add(state.flipped);\n    state.flipped = null;\n    document.getElementById('player').classList.remove('show');\n    document.getElementById('player').setAttribute('aria-hidden', 'true');\n    document.getElementById('p-cta').classList.remove('show');\n    // Update grid: viewed cards → un-flip (show back again) but dimmed so user\n    // knows they've been opened. Interpretation: \"ปิดการ์ดนั้น\" = not flipped, just dimmed.\n    document.querySelectorAll('.card').forEach(c => {\n      const isViewed = state.viewed.has(c.dataset.id);\n      c.classList.remove('flipped');\n      c.classList.toggle('viewed', isViewed);\n      c.classList.remove('dimmed');\n    });\n    renderDots();\n  }\n\n  function openByIdx(i) { openById(SHOPS[i].id); }\n\n  function closeAll() { closePlayer(); }\n\n  // Player-specific controls\n  document.getElementById('p-close').addEventListener('click', closePlayer);\n  document.getElementById('p-play').addEventListener('click', togglePlay);\n  document.getElementById('p-sound').addEventListener('click', () => {\n    state.muted = !state.muted;\n    if (state.currentVideo) state.currentVideo.muted = state.muted;\n    document.getElementById('p-sound-ico').innerHTML = state.muted\n      ? '<path d=\"M2 6v4h3l4 3V3L5 6H2z\"/><path d=\"M11 5l4 6M15 5l-4 6\"/>'\n      : '<path d=\"M2 6v4h3l4 3V3L5 6H2z\"/><path d=\"M12 5a4 4 0 0 1 0 6M14 3a7 7 0 0 1 0 10\"/>';\n  });\n  document.getElementById('p-prev').addEventListener('click', () => {\n    const i = SHOPS.findIndex(s => s.id === state.flipped);\n    openByIdx((i - 1 + SHOPS.length) % SHOPS.length);\n  });\n  document.getElementById('p-next').addEventListener('click', () => {\n    const i = SHOPS.findIndex(s => s.id === state.flipped);\n    openByIdx((i + 1) % SHOPS.length);\n  });\n  document.getElementById('p-next2').addEventListener('click', () => {\n    const i = SHOPS.findIndex(s => s.id === state.flipped);\n    openByIdx((i + 1) % SHOPS.length);\n  });\n  document.getElementById('p-replay').addEventListener('click', () => {\n    document.getElementById('p-cta').classList.remove('show');\n    document.getElementById('p-fill').style.width = '0%';\n    if (state.currentVideo) {\n      state.currentVideo.currentTime = 0;\n      state.currentVideo.play().catch(() => {});\n    }\n  });\n  document.getElementById('p-back').addEventListener('click', closePlayer);\n\n  // ─── Nav ────────────────────────────────────────────────────\n  document.getElementById('next').addEventListener('click', () => {\n    if (!state.flipped) return openByIdx(0);\n    const i = SHOPS.findIndex(s => s.id === state.flipped);\n    openByIdx((i + 1) % SHOPS.length);\n  });\n  document.getElementById('prev').addEventListener('click', () => {\n    if (!state.flipped) return openByIdx(SHOPS.length - 1);\n    const i = SHOPS.findIndex(s => s.id === state.flipped);\n    openByIdx((i - 1 + SHOPS.length) % SHOPS.length);\n  });\n  document.getElementById('close').addEventListener('click', closeAll);\n\n  document.addEventListener('keydown', (e) => {\n    if (e.key === 'Escape' && state.flipped) closeAll();\n    if (e.key === 'ArrowRight' && state.flipped) document.getElementById('p-next').click();\n    if (e.key === 'ArrowLeft' && state.flipped) document.getElementById('p-prev').click();\n    if (e.key === ' ' && state.flipped) { e.preventDefault(); togglePlay(); }\n  });\n\n  // ─── Tweaks ───────────────────────────────────────────────\n  function applyTweaks() {\n    const t = state.tweaks;\n    const accentMap = {\n      gold:   { c1: '#e8c76a', c2: '#f5dc8a', dim: 'rgba(232,199,106,' },\n      rose:   { c1: '#e88a9a', c2: '#f5b3c0', dim: 'rgba(232,138,154,' },\n      teal:   { c1: '#6adac9', c2: '#8ae5d7', dim: 'rgba(106,218,201,' },\n    };\n    const a = accentMap[t.accent] || accentMap.gold;\n    const r = document.documentElement;\n    r.style.setProperty('--gold', a.c1);\n    r.style.setProperty('--gold-2', a.c2);\n    r.style.setProperty('--gold-dim', a.dim + '.35)');\n\n    document.documentElement.style.setProperty('--flip-dur', t.flipDur + 's');\n    document.querySelectorAll('.card').forEach(c => c.style.transitionDuration = t.flipDur + 's');\n\n    document.body.classList.toggle('no-glow', t.glow === 'off');\n    if (t.glow === 'off') {\n      document.querySelectorAll('.back').forEach(b => b.style.boxShadow = '0 20px 60px rgba(0,0,0,.5)');\n      document.querySelectorAll('.front').forEach(f => f.style.boxShadow = '0 20px 60px rgba(0,0,0,.6)');\n    } else {\n      document.querySelectorAll('.back').forEach(b => b.style.boxShadow = '');\n      document.querySelectorAll('.front').forEach(f => f.style.boxShadow = '');\n    }\n  }\n\n  function bindSeg(id, key) {\n    const seg = document.getElementById(id);\n    seg.querySelectorAll('button').forEach(b => {\n      b.classList.toggle('active', b.dataset.val == state.tweaks[key]);\n      b.addEventListener('click', () => {\n        seg.querySelectorAll('button').forEach(x => x.classList.remove('active'));\n        b.classList.add('active');\n        state.tweaks[key] = b.dataset.val;\n        if (key === 'layout') render(); // needs rebuild\n        applyTweaks();\n        persist();\n      });\n    });\n  }\n\n  function persist() {\n    const edits = {\n      accent: state.tweaks.accent,\n      layout: state.tweaks.layout,\n      flipDur: state.tweaks.flipDur,\n      glow: state.tweaks.glow,\n    };\n    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch(e){}\n  }\n\n  // Edit mode bridge\n  window.addEventListener('message', (e) => {\n    if (!e.data || !e.data.type) return;\n    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('open');\n    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('open');\n  });\n  // announce after listener ready\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}\n\n  // Map incoming defaults key `flipDur` to local seg name `dur`\n  bindSeg('accent-seg', 'accent');\n  bindSeg('layout-seg', 'layout');\n  const durSeg = document.getElementById('dur-seg');\n  durSeg.querySelectorAll('button').forEach(b => {\n    b.classList.toggle('active', b.dataset.val == state.tweaks.flipDur);\n    b.addEventListener('click', () => {\n      durSeg.querySelectorAll('button').forEach(x => x.classList.remove('active'));\n      b.classList.add('active');\n      state.tweaks.flipDur = b.dataset.val;\n      applyTweaks();\n      persist();\n    });\n  });\n  bindSeg('glow-seg', 'glow');\n\n  // ─── Init ────────────────────────────────────────────────\n  render();\n  applyTweaks();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
